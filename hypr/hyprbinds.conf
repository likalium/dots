# Written from Scratch by likalium :)
# But note that I read the wiki (https://wiki.hyprland.org/) all along the creation of this config


# Hyprland Session
bind=$mainMod,Q,exit, # kill active session - Q for quit - Historically it was M cuz it's the default
bind=$mainMod,L,exec,wlogout # wLogout


# Layouts
bind=$mainMod,N,exec,hyprctl keyword general:layout dwindle # Set the layout to dwiNdle
bind=$mainMod,A,exec,hyprctl keyword general:layout master # Set the layout to mAster

# Dwindle
bind=$mainMod,O,togglegroup # tOgglegroup
bind=$mainMod,G,togglesplit # toGglesplit
bind=$thirdMod $secondMod,LEFT, changegroupactive, b # Back
bind=$thirdMod $secondMod,RIGHT,changegroupactive, f # Forward

# Master
bind=$mainMod,W,layoutmsg,swapwithmaster #sWapwithmaster


# Workspaces
# thx you vaxry for saying me to use wev
# Note that I used codes corresponding to the keys I want to use cause I use AZERTY. So 10 is for 1, 11 for 2, 13 for 3,etc.
bind=$mainMod,10,workspace,1
bind=$mainMod,11,workspace,2
bind=$mainMod,12,workspace,3
bind=$mainMod,13,workspace,4
bind=$mainMod,14,workspace,5
bind=$mainMod,15,workspace,6
bind=$mainMod,16,workspace,7
bind=$mainMod,17,workspace,8
bind=$mainMod,18,workspace,9
bind=$mainMod,19,workspace,special
bind=$mainMod,s,workspace,name:spotify # useful cuz i let run spotify without watching it
bind=$mainMod,d,workspace,name:discord # it's always open so it's useful too
bind=$mainMod,v,workspace,name:vim #nVim cuz i suppose that it can be useful
bind=$mainMod,m,workspace,name:mpv # Mpv

bind=$secondMod,10,movetoworkspace,1
bind=$secondMod,11,movetoworkspace,2
bind=$secondMod,12,movetoworkspace,3
bind=$secondMod,13,movetoworkspace,4
bind=$secondMod,14,movetoworkspace,5
bind=$secondMod,15,movetoworkspace,6
bind=$secondMod,16,movetoworkspace,7
bind=$secondMod,17,movetoworkspace,8
bind=$secondMod,18,movetoworkspace,9
bind=$secondMod,19,movetoworkspace,10
bind=$secondMod,n,movetoworkspace,name:nvim # Nvim cuz a so incredible text editor MUST have his own workspace
bind=$secondMod,m,movetoworkspace,name:mpv # this workspace is my home cinema hehe

# Apps
bind=$mainMod,Return,exec,kitty # Kitty
bind=$secondMod,F4,killactive
bind=$mainMod,T,exec,thunar # Thunar
bind=$mainMod,s,exec,bash $HOME/.config/hypr/scripts/spotify.sh
bind=$mainMod,d,exec,bash $HOME/.config/hypr/scripts/discord.sh

#bind=SUPER_Shiftl_L,S,exec, emacs --with-profile spacemacs # exec Spacemacs
bind=$mainMod,e,exec,emacs # exec Emacs
bind=$mainMod,de,exec,emacs --with-profile doom # exec Doom emacs

# Fullscreen
bind=,F11,fullscreen, 1
bind=$mainMod,F11,fullscreen, 0
bind=$secondMod, F11,fullscreen, 0 


# Windows
bind=$mainMod,I,pin # pIn
bind=$mainMod,P,pseudo # Pseudo
bind=$mainMod,F,togglefloating # toggleFloating 
bind=$mainMod,up,movewindow, u
bind=$mainMod,down,movewindow, d
bind=$mainMod,left,movewindow, l
bind=$mainMod,right,movewindow, r
bind=$secondMod,up,movefocus, u
bind=$secondMod,down,movefocus, d
bind=$secondMod,left,movefocus, l
bind=$secondMod,right,movefocus, r


# Mouse
bindm=$mainMod,mouse:272,movewindow
bindm=$mainMod,mouse:273,resizewindow


# Sound
# Entirely copied from the "Example Usage" part from here: https://wiki.hyprland.org/Configuring/Binds/#bind-flags
# Example volume button that allows press and hold
binde=,XF86AudioRaiseVolume,exec,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
# Example volume button that will activate even while an input inhibitor is active
bindl=,XF86AudioLowerVolume,exec,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindr=,XF86AudioMute,exec,wpctl set-volume @DEFAULT_AUDIO_SINK@ 50% || wpctl set-volume @DEFAULT_AUDIO_SINK@ 0%

# launcher binds
# Entirely copied from the "Example Usage" part from here: https://wiki.hyprland.org/Configuring/Binds/#bind-flags
# Start wofi opens wofi on first press, closes it on second
bindr=SUPER,SUPER_L,exec,pkill rofi || rofi -show drun # I added the "--show run"

# Screenshot
bind=,Print,exec,grimblast --notify copysave screen
bind=SHIFT,Print,exec,grimblast --notify copysave area

# Color picker
bind=$mainMod,H,exec,hyprpicker > $HOME/colorpicker
